<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>油屋町川船 囃子練習アプリ</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #1a1a1a; color: white;
            font-family: sans-serif; user-select: none; -webkit-user-select: none;
            overflow-x: hidden;
        }
        .screen {
            display: none; width: 100vw; min-height: 100vh;
            flex-direction: column; align-items: center; justify-content: center;
            box-sizing: border-box; padding: 20px;
        }
        .active { display: flex; }
        .hide-btn { display: none !important; }
        /* 📱 縦画面でお稽古に集中できるよう、ゲーム画面はスクロール禁止でぴったり固定 */
        #screenGame {
            height: 100vh; height: -webkit-fill-available;
            overflow: hidden; position: fixed; top: 0; left: 0; padding: 0;
        }

        h1, h2 { margin-top: 10px; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); text-align: center; }
        
        .btn {
            width: 80%; max-width: 300px; padding: 15px 20px; margin: 10px 0;
            font-size: 18px; font-weight: bold; text-align: center;
            background: #d9534f; border: 2px solid #fff; border-radius: 30px;
            color: white; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-blue { background: #337ab7; }
        .btn-gold { background: #f0ad4e; }
        .btn-disabled { background: #555 !important; border-color: #888; cursor: not-allowed; }

        .form-group { width: 80%; max-width: 300px; margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group label { font-size: 14px; margin-bottom: 5px; color: #ccc; }
        .form-group input { padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #fff; background: #333; color: white; }

        /* --- 縦向き画面用の三等分レイアウト調整 --- */
        #gameTopArea { 
            width: 100vw; 
            height: 38vh; /* 高さは元の38vhのままキープ */
            box-sizing: border-box; /* paddingを含めたサイズ計算にする */
            padding-top: 55px; /* 💡 上部に55pxの余白を作り、中のSVGだけを下へ押し下げる */
            
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #111; 
            position: relative; 
        }

        /* infoOverlay（文字）の位置はそのままで固定 */
        #infoOverlay {
            position: absolute; 
            top: 12px; 
            left: 12px; 
            font-size: 14px;
            background: rgba(0,0,0,0.7); 
            padding: 6px 10px; 
            border-radius: 5px; 
            z-index: 5;
        }
        #gameCanvas { display: block; background: #222; width: 100vw; height: 22vh; }
        #controls { display: flex; width: 100vw; height: 40vh; } /* ボタンを押しやすくするため下部を広めに */
        
        .hit-btn {
            flex: 1; border: none; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
            box-sizing: border-box; border-right: 1px solid #222;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .hit-btn-title { font-size: 36px; font-weight: bold; margin-bottom: 4px; }
        .hit-btn-sub { font-size: 14px; opacity: 0.7; font-weight: normal; }

        #btnLeft { background-color: #337ab7; }
        #btnDon  { background-color: #d9534f; }
        #btnRight{ background-color: #2eb82e; }
        .hit-btn:active { opacity: 0.6; }

        .kane-part { fill: #998040; stroke: #fff; stroke-width: 2; transition: fill 0.1s ease; }
        .kane-active { fill: #ffdf00 !important; filter: drop-shadow(0px 0px 15px #ffdf00); }
        .kane-center { fill: #b3974e; stroke: #fff; stroke-width: 2; transition: fill 0.1s ease; }
        .taiko-part {
            transition: fill 0.05s ease;
        }
        /* 太鼓の左/右が光ったときの色（不透明度0.5の朱色・オレンジ系） */
        .taiko-active {
            fill: rgba(217, 83, 79, 0.5) !important;
        }
        #userStatus { font-size: 14px; margin-bottom: 20px; color: #ccc; }
        
        /* 💡 成果表示エリア全体のスクロールとサイズを最適化 */
        #historyList { 
            width: 100%; 
            max-width: 500px; 
            max-height: 65vh; 
            overflow-y: auto; 
            background: rgba(0,0,0,0.4); 
            padding: 10px; 
            border-radius: 10px; 
            box-sizing: border-box;
        }
        .history-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #444; font-size: 14px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBig-3vYGSB1s2tDzDceJMUkrm4Ir8kJVY",
            authDomain: "aburaya.firebaseapp.com",
            projectId: "aburaya",
            storageBucket: "aburaya.firebasestorage.app",
            messagingSenderId: "601080015473",
            appId: "1:601080015473:web:795bfb90a56ed7dd4689d0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.handleLogin = () => {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            signInWithEmailAndPassword(auth, email, password)
                .then(() => { alert("ログインしました！"); window.nextScreen('screenMenu'); })
                .catch(() => { alert("ログインに失敗しました。"); });
        };
        window.logout = () => { signOut(auth).then(() => alert("ログアウトしました")); };

        onAuthStateChanged(auth, (user) => {
            const gotoLoginBtn = document.getElementById('gotoLoginBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            const myPageBtn = document.getElementById('myPageBtn');
            const userStatus = document.getElementById('userStatus');
            
            if (user) {
                window.currentUser = user;
                userStatus.innerText = `お稽古中: ${user.email.split('@')[0]} さん`;
                gotoLoginBtn.style.display = "none"; 
                logoutBtn.style.display = "block"; 
                myPageBtn.classList.remove('btn-disabled');
            } else {
                window.currentUser = null; 
                userStatus.innerText = "ゲストモード（スコアは保存されません）";
                gotoLoginBtn.style.display = "block"; 
                logoutBtn.style.display = "none"; 
                myPageBtn.classList.add('btn-disabled');
            }
        });

        window.saveScoreToFirebase = async (gakki, kyoku, level, score, ryo, ka) => {
            if (!window.currentUser) return;
            try {
                await addDoc(collection(db, "scores"), {
                    uid: window.currentUser.uid, 
                    userEmail: window.currentUser.email,
                    gakki: gakki, 
                    kyoku: kyoku, 
                    level: level,
                    score: score, 
                    ryo: ryo, 
                    ka: ka, 
                    timestamp: new Date()
                });
            } catch (e) { console.error(e); }
        };

        let activeAchievementGakki = "小鉦・大鉦";

        // --- ✨ 星（お稽古の成果）Firebase連携・完全版システム制御 ---
        window.showAchievements = async () => {
            const container = document.getElementById('historyList');
            if (!container) return;
            
            if (!window.currentUser) {
                alert("ログインするとお稽古の成果を確認・保存できます！");
                window.nextScreen('screenMenu');
                return;
            }
            
            container.innerHTML = "<p style='text-align:center; color:#aaa; padding:20px;'>スコアを確認中...</p>";
            container.style.cssText = "display: flex; flex-direction: column; align-items: center; width: 100%;";

            const highScores = {};
            
            try {
                const q = query(
                    collection(db, "scores"), 
                    where("uid", "==", window.currentUser.uid)
                );
                const querySnapshot = await getDocs(q);
                
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const scoreKey = `${data.gakki}_${data.kyoku}_${data.level}`;
                    const numericScore = parseFloat(data.score || "0.0");
                    
                    if (!highScores[scoreKey] || numericScore > highScores[scoreKey]) {
                        highScores[scoreKey] = numericScore;
                    }
                });
            } catch (error) {
                console.error("Firestoreからの成果取得に失敗しました:", error);
                container.innerHTML = "<p style='text-align:center; color:#d9534f; padding:20px;'>データの読み込みに失敗しました。再試行してください。</p>";
                return;
            }

            container.innerHTML = "";

            // 🎵 1. 楽器切り替え用のタブ（ボタン）エリアを作成
            const tabContainer = document.createElement('div');
            tabContainer.style.cssText = "display: flex; width: 100%; max-width: 600px; gap: 6px; padding: 12px 0; margin-bottom: 15px; box-sizing: border-box; flex-shrink: 0; position: sticky; top: 0; background: #1a1a1a; z-index: 10;";
            
            const gakkiList = ["小鉦・大鉦", "〆太鼓", "大太鼓"];
            
            gakkiList.forEach(gakki => {
                const tabBtn = document.createElement('button');
                tabBtn.innerText = gakki.replace("・", "\n");
                
                if (gakki === activeAchievementGakki) {
                    tabBtn.style.cssText = "flex: 1; padding: 10px 5px; font-size: 14px; font-weight: bold; background: #f0ad4e; color: #1a1a1a; border: 2px solid #fff; border-radius: 8px; cursor: pointer;";
                } else {
                    tabBtn.style.cssText = "flex: 1; padding: 10px 5px; font-size: 14px; font-weight: bold; background: #333; color: #ccc; border: 1px solid #555; border-radius: 8px; cursor: pointer;";
                }
                
                tabBtn.onclick = () => {
                    activeAchievementGakki = gakki = gakki;
                    window.showAchievements();
                };
                tabContainer.appendChild(tabBtn);
            });
            container.appendChild(tabContainer);

            // 🎵 2. 応援メッセージ（常設案内）
            const welcomeMsg = document.createElement('div');
            welcomeMsg.style.cssText = "background: rgba(240,173,78,0.15); border: 1px dashed #f0ad4e; color: #f0ad4e; padding: 12px; border-radius: 10px; text-align: center; margin-bottom: 15px; font-size: 13px; width: 100%; max-width: 600px; box-sizing: border-box; line-height: 1.5; flex-shrink: 0;";
            welcomeMsg.innerHTML = "<strong>目指せ！90点以上</strong><br>それぞれのレベルで90点を超えると★をゲット！<br>さらに上の『95点』や『100点』にもチャレンジしよう！";
            container.appendChild(welcomeMsg);

            // 🎵 3. 選択されている楽器の「曲」をループ処理して星を生成
            const gakki = activeAchievementGakki;

            kyokuMasta.forEach(kyoku => {
                const scoreLvl1 = highScores[`${gakki}_${kyoku}_1`] || 0.0;
                const scoreLvl2 = highScores[`${gakki}_${kyoku}_2`] || 0.0;
                const scoreLvl3 = highScores[`${gakki}_${kyoku}_3`] || 0.0;

            
                // 曲ごとのカード（行）を作成
                const row = document.createElement('div');
                row.style.cssText = "display: flex; flex-direction: row; flex-wrap: wrap; justify-content: space-between; align-items: center; width: 98%; max-width: 600px; background: rgba(255,255,255,0.05); margin-bottom: 12px; padding: 16px; border-radius: 12px; border: 1px solid #333; box-sizing: border-box; gap: 12px;";

                // 曲名タイトル
                const title = document.createElement('div');
                title.style.cssText = "font-size: 18px; font-weight: bold; color: #fff; text-align: left; border-left: 4px solid #f0ad4e; padding-left: 8px; flex: 1 1 100%; min-width: 100px; box-sizing: border-box;";
                title.innerText = kyoku;
                row.appendChild(title);

                // 星の達成条件を設定
                const starConditions = [
                    { isCleared: scoreLvl1 >= 90.0, label: "かんたん" },
                    { isCleared: scoreLvl2 >= 90.0, label: "ふつう" },
                    { isCleared: scoreLvl3 >= 90.0, label: "おに" },
                    { isCleared: scoreLvl2 >= 95.0, label: "95点突破（ふつう）" },
                    { isCleared: scoreLvl2 >= 100.0, label: "100点満点（ふつう）" }
                ];

                // 条件ごとの星を縦一列（5個）に綺麗に並べるコンテナ
                const starFlex = document.createElement('div');
                starFlex.style.cssText = "display: flex; flex-direction: column; gap: 6px; flex: 2 1 0%; min-width: 200px; max-width: 100%; box-sizing: border-box;";

                starConditions.forEach(star => {
                    const itemLine = document.createElement('div');
                    itemLine.style.cssText = "display: flex; align-items: center; gap: 8px; font-size: 15px; white-space: normal; word-break: break-all;";

                    const starSpan = document.createElement('span');
                    if (star.isCleared) {
                        starSpan.innerText = "★";
                        starSpan.style.cssText = "color: #ffdf00; text-shadow: 0 0 8px #ffdf00; font-size: 20px; font-weight: bold; flex-shrink: 0;";
                    } else {
                        starSpan.innerText = "☆";
                        starSpan.style.cssText = "color: #444; font-size: 20px; font-weight: bold; flex-shrink: 0;";
                    }

                    const textLabel = document.createElement('span');
                    textLabel.innerText = star.label;
                    if (star.isCleared) {
                        textLabel.style.cssText = "color: #ffdf00; font-weight: bold;";
                    } else {
                        textLabel.style.cssText = "color: #888;";
                    }

                    itemLine.appendChild(starSpan);
                    itemLine.appendChild(textLabel);
                    starFlex.appendChild(itemLine);
                });

                row.appendChild(starFlex);
                container.appendChild(row);
            });

            window.nextScreen('screenHistory');
        };
    </script>
</head>
<body>
    
    <div id="screenMenu" class="screen active">
        <h1>🏮 油屋町川船 🏮<br>囃子練習アプリ</h1>
        <div id="userStatus">読み込み中...</div>
        <button class="btn" onclick="nextScreen('screenGakki')">稽古を始める</button>
        <button id="myPageBtn" class="btn btn-blue btn-disabled" onclick="if(window.currentUser){ window.showAchievements(); }">マイページ</button>
        <button id="gotoLoginBtn" class="btn btn-gold" onclick="nextScreen('screenAuth')">ログイン画面へ</button>
        <button id="logoutBtn" class="btn" style="background:#555; display:none;" onclick="window.logout()">ログアウト</button>
    </div>

    <div id="screenAuth" class="screen">
        <h2>ログイン</h2>
        <div class="form-group">
            <label>お稽古用ID</label>
            <input type="email" id="authEmail" placeholder="taro@hayashi.com">
        </div>
        <div class="form-group">
            <label>パスワード</label>
            <input type="password" id="authPassword" placeholder="******">
        </div>
        <button class="btn btn-blue" onclick="window.handleLogin()">ログインする</button>
        <button class="btn" style="background:#555;" onclick="nextScreen('screenMenu')">戻る</button>
    </div>

    <div id="screenHistory" class="screen">
        <h2>スコア（目標90点！）</h2>
        <div id="historyList"></div>
        <button class="btn" style="background:#555; flex-shrink: 0;" onclick="nextScreen('screenMenu')">メニューに戻る</button>
    </div>

    <div id="screenGakki" class="screen">
        <h2>どの楽器を練習しますか？</h2>
        <button class="btn" onclick="selectGakki('大太鼓')">🥁 大太鼓</button>
        <button class="btn btn-blue" onclick="selectGakki('〆太鼓')">🪘 〆太鼓</button>
        <button class="btn btn-gold" onclick="selectGakki('小鉦・大鉦')">🔔 小鉦・大鉦</button>
        <button class="btn" style="background:#555;" onclick="nextScreen('screenMenu')">戻る</button>
    </div>

    <div id="screenKyoku" class="screen">
        <h2>曲を選んでください</h2>
        <div id="kyokuList" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
        <button class="btn" style="background:#555;" onclick="nextScreen('screenGakki')">戻る</button>
    </div>

    <div id="screenLevel" class="screen">
        <h2>稽古の難易度</h2>
        <button class="btn btn-blue" onclick="selectLevel(1)">🔰 かんたん（色あり）</button>
        <button class="btn btn-gold" onclick="selectLevel(2)">🔥 ふつう（色なし）</button>
        <button class="btn" style="background: #d9534f;" onclick="selectLevel(3)">👹 おに</button>
        <button class="btn" style="background:#555;" onclick="nextScreen('screenKyoku')">戻る</button>
    </div>

    <div id="screenGame" class="screen">
        <div id="gameTopArea">
            <div id="infoOverlay">
                <span id="txtGakki"></span> - <span id="txtKyoku"></span> (<span id="txtLevel"></span>)<br>
                <span>得点: <span id="txtScore">100.0</span> 点</span>
            </div>
            
            <button onclick="window.abortGame()" style="position: absolute; top: 12px; right: 12px; background: rgba(217,83,79,0.8); color: white; border: 1px solid white; padding: 6px 12px; border-radius: 5px; font-weight: bold; z-index: 10; cursor: pointer;">
                中断
            </button>
                
            <svg id="kaneSvg" width="180" height="180" viewBox="0 0 200 200" style="overflow: visible;">
                <defs>
                    <clipPath id="circleClip">
                        <circle cx="100" cy="100" r="85" />
                    </clipPath>
                </defs>

                <circle cx="100" cy="100" r="90" fill="#443518" stroke="#665226" stroke-width="4"/>
                <circle cx="100" cy="100" r="85" fill="#806b35" />

                <g clip-path="url(#circleClip)">
                    <path id="kanePart2" class="kane-part" d="M 100,100 L 0,0 A 130,130 0 0,0 0,200 Z" />
                    <path id="kanePart3" class="kane-part" d="M 100,100 L 200,0 A 130,130 0 0,1 200,200 Z" />
                    
                    <line x1="100" y1="100" x2="100" y2="15" stroke="#fff" stroke-width="1.5" opacity="0.5" />
                    <line x1="100" y1="100" x2="100" y2="185" stroke="#fff" stroke-width="1.5" opacity="0.5" />
                </g>

                <circle id="kanePart1" class="kane-center" cx="100" cy="100" r="38" />
                <circle cx="100" cy="100" r="10" fill="#443518" />
                <circle cx="100" cy="100" r="8" fill="#5c4921" />
            </svg>
            <svg id="taikoSvg" width="180" height="180" viewBox="0 0 200 200" style="overflow: visible; display: none;">
                <defs>
                    <clipPath id="taikoClip">
                        <circle cx="100" cy="100" r="80" />
                    </clipPath>
                </defs>
                <circle cx="100" cy="100" r="86" fill="#8B4513" stroke="#5c2e0b" stroke-width="4"/>
                <circle cx="100" cy="100" r="80" fill="#fcf3db" />
                
                <g clip-path="url(#taikoClip)">
                    <path id="taikoPart2" class="taiko-part" d="M 100,0 A 80,80 0 0,0 100,200 Z" fill="transparent" transition="fill 0.1s" />
                    <path id="taikoPart3" class="taiko-part" d="M 100,0 A 80,80 0 0,1 100,200 Z" fill="transparent" transition="fill 0.1s" />
                    <line x1="100" y1="0" x2="100" y2="200" stroke="#8B4513" stroke-width="2" opacity="0.2" stroke-dasharray="4" />
                </g>
                <circle cx="100" cy="100" r="15" fill="none" stroke="#8B4513" stroke-width="2" opacity="0.3" />
            </svg>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div id="controls">
            <div id="btnLeft" class="hit-btn">
                <span class="hit-btn-title">左</span>
                <span class="hit-btn-sub">/ D</span>
            </div>
            <div id="btnDon" class="hit-btn">
                <span class="hit-btn-title">中</span>
                <span class="hit-btn-sub">/ F</span>
            </div>
            <div id="btnRight" class="hit-btn">
                <span class="hit-btn-title">右</span>
                <span class="hit-btn-sub">/ J</span>
            </div>
        </div>
    </div>

    <div id="screenResult" class="screen">
        <h2>お稽古終了！</h2>
        <h1 id="resScore" style="color:#f0ad4e; font-size: 48px;">100.0 点</h1>
        <div style="font-size: 20px; margin-bottom: 30px;">
            良: <span id="resRyo" style="color:#d9534f; font-weight:bold;">0</span> 回 / 
            可: <span id="resKa" style="color:#337ab7; font-weight:bold;">0</span> 回
        </div>
        <button class="btn" onclick="document.getElementById('btnDon').classList.remove('hide-btn'); nextScreen('screenMenu');">メニューに戻る</button>
    </div>

<script>
// --- ⚙️ 楽譜・音声設定データベース ⚙️ ---

const bgmUrls = {

    const btnDon = document.getElementById('btnDon');
    const kaneSvg = document.getElementById('kaneSvg');
    const taikoSvg = document.getElementById('taikoSvg');

    if (selectedGakki === "大太鼓" || selectedGakki === "〆太鼓") {
        btnDon.classList.add('hide-btn');      
        kaneSvg.style.display = "none";         
        taikoSvg.style.display = "block";       
    } else {
        btnDon.classList.remove('hide-btn');   
        kaneSvg.style.display = "block";        
        taikoSvg.style.display = "none";        
    }

    const listDiv = document.getElementById('kyokuList'); listDiv.innerHTML = "";
    kyokuMasta.forEach(kyoku => {
        const button = document.createElement('button'); button.className = "btn btn-blue";
        button.innerText = kyoku; 
        button.onclick = () => { selectedKyoku = kyoku; nextScreen('screenLevel'); }; 
        listDiv.appendChild(button);
    });
    nextScreen('screenKyoku');
}

window.selectLevel = (level) => { selectedLevel = level; startGame(); }

window.abortGame = () => {
    if (confirm("お稽古を中断してメニューに戻りますか？")) {
        isPlaying = false;
        if (bgmAudio) { bgmAudio.pause(); bgmAudio.currentTime = 0; }
        document.getElementById('btnDon').classList.remove('hide-btn');
        window.nextScreen('screenMenu');
    }
};

function startGame() {
    document.getElementById('txtGakki').innerText = selectedGakki;
    document.getElementById('txtKyoku').innerText = selectedKyoku;
    
    let levelText = "かんたん";
    if (selectedLevel === 2) levelText = "ふつう";
    if (selectedLevel === 3) levelText = "おに";
    document.getElementById('txtLevel').innerText = levelText;

    countRyo = 0; countKa = 0; countMiss = 0; judgeText = "";
    document.getElementById('txtScore').innerText = "100.0";

    if (hayashiScores[selectedKyoku] && hayashiScores[selectedKyoku][selectedGakki]) {
        currentNotes = JSON.parse(JSON.stringify(hayashiScores[selectedKyoku][selectedGakki]));
    } else { currentNotes = []; }

    window.nextScreen('screenGame');
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    if (bgmAudio) { bgmAudio.pause(); }
    bgmAudio = new Audio(bgmUrls[selectedKyoku]);
    bgmAudio.preload = "auto";
    
    bgmAudio.addEventListener('canplaythrough', () => {
        setTimeout(() => { if(isPlaying) return; bgmAudio.play(); startTime = performance.now(); isPlaying = true; gameLoop(); }, 1000);
    }, { once: true });
    bgmAudio.addEventListener('error', () => {
        startTime = performance.now(); isPlaying = true; gameLoop();
    }, { once: true });
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSynthSound(type) {
    let targetAudioId = "";

    if (selectedGakki === "大太鼓") {
        targetAudioId = `soundO${type}`;
    } else if (selectedGakki === "〆太鼓") {
        targetAudioId = `soundShime${type}`;
    } else if (selectedGakki === "小鉦・大鉦") {
        targetAudioId = `soundKane${type}`;
    }

    if (targetAudioId) {
        const audioFile = document.getElementById(targetAudioId);
        if (audioFile) {
            audioFile.currentTime = 0;
            audioFile.play().catch(err => console.log("再生エラー:", err));
        }
    }

    if (selectedGakki === "大太鼓" || selectedGakki === "〆太鼓") {
        const taikoPart = document.getElementById(`taikoPart${type}`);
        if (taikoPart) {
            taikoPart.classList.add('taiko-active');
            setTimeout(() => { taikoPart.classList.remove('taiko-active'); }, 80); 
        }
    } else {
        const kanePart = document.getElementById(`kanePart${type}`);
        if (kanePart) {
            kanePart.classList.add('kane-active');
            setTimeout(() => { kanePart.classList.remove('kane-active'); }, 100); 
        }
    }
}

function calculateCurrentScore() {
    let currentScore = 100.0 - (countKa * 0.5) - (countMiss * 2.0);
    if (currentScore < 0) currentScore = 0.0;
    return currentScore.toFixed(1);
}

function gameLoop() {
    if (!isPlaying) return;
    const currentTime = (performance.now() - startTime) / 1000;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const centerY = canvas.height / 2;

    ctx.strokeStyle = '#555'; ctx.lineWidth = 6; ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); ctx.stroke();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(JUDGE_X, centerY, 30, 0, Math.PI * 2); ctx.stroke();

    if (judgeTextTimer > 0) {
        ctx.fillStyle = judgeText === "良" ? "#ff0" : (judgeText === "可" ? "#0f0" : "#f33");
        ctx.font = "bold 24px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(judgeText, JUDGE_X, centerY - 40); judgeTextTimer--;
    }

    let activeNotes = 0;
    currentNotes.forEach(note => {
        if (note.isHit) return;
        const x = (note.time - currentTime) * NOTE_SPEED + JUDGE_X;
        if (x < JUDGE_X - 40) {
            note.isHit = true; countMiss++; judgeText = "不可"; judgeTextTimer = 30;
            document.getElementById('txtScore').innerText = calculateCurrentScore();
            return;
        }
        activeNotes++;
        if (x > -30 && x < canvas.width + 30) {
            if (selectedLevel === 3) {
                return;
            } else if (selectedLevel === 2) {
                ctx.fillStyle = '#ffffff';
            } else {
                ctx.fillStyle = note.type === 1 ? '#d9534f' : (note.type === 2 ? '#337ab7' : '#2eb82e');
            }
            ctx.beginPath(); ctx.arc(x, centerY, 22, 0, Math.PI * 2); ctx.fill();
        }
    });

    const lastNoteTime = currentNotes.length > 0 ? currentNotes[currentNotes.length - 1].time : 0;
    const isAudioEnded = bgmAudio && bgmAudio.ended;
    const isTimeout = currentTime > lastNoteTime + 5; 

    if (isAudioEnded || isTimeout) { 
        isPlaying = false; 
        if(bgmAudio) bgmAudio.pause(); 
        endGame(); 
        return;
    }
    requestAnimationFrame(gameLoop);
}

function checkHit(type) {
    if (!isPlaying) return;
    const currentTime = (performance.now() - startTime) / 1000;
    let isNoteFound = false;
    for (let note of currentNotes) {
        if (!note.isHit) {
            const diff = Math.abs(note.time - currentTime);
            if (diff < 0.25) {
                isNoteFound = true;
                if (note.type === type) {
                    if (diff < 0.06) { note.isHit = true; countRyo++; judgeText = "良"; judgeTextTimer = 30; } 
                    else if (diff < 0.15) { note.isHit = true; countKa++; judgeText = "可"; judgeTextTimer = 30; } 
                    else { note.isHit = true; countMiss++; judgeText = "不可"; judgeTextTimer = 30; }
                } else { note.isHit = true; countMiss++; judgeText = "不可"; judgeTextTimer = 30; }
                break;
            }
        }
    }
    if (!isNoteFound) { countMiss++; judgeText = "不可"; judgeTextTimer = 20; }
    document.getElementById('txtScore').innerText = calculateCurrentScore();
}

function endGame() {
    const finalScore = calculateCurrentScore();
    const numericScore = parseFloat(finalScore);
    
    document.getElementById('resScore').innerText = `${finalScore} 点`;
    document.getElementById('resRyo').innerText = countRyo; 
    document.getElementById('resKa').innerText = countKa;

    const saveKey = `highscore_${selectedGakki}_${selectedKyoku}_${selectedLevel}`;
    const pastHighScore = parseFloat(localStorage.getItem(saveKey) || "0.0");
    
    if (numericScore > pastHighScore) {
        localStorage.setItem(saveKey, finalScore);
    }

    window.nextScreen('screenResult');
    
    if (window.currentUser && typeof window.saveScoreToFirebase === 'function') {
        window.saveScoreToFirebase(selectedGakki, selectedKyoku, selectedLevel, numericScore, countRyo, countKa);
    }
}

const handlePress = (type) => { playSynthSound(type); checkHit(type); };
document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); handlePress(2); });
document.getElementById('btnDon').addEventListener('touchstart', (e) => { e.preventDefault(); handlePress(1); });
document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); handlePress(3); });
document.getElementById('btnLeft').addEventListener('mousedown', () => handlePress(2));
document.getElementById('btnDon').addEventListener('mousedown', () => handlePress(1));
document.getElementById('btnRight').addEventListener('mousedown', () => handlePress(3));

window.addEventListener('keydown', (e) => {
    if(e.key === 'f' || e.key === 'F') handlePress(1);
    if(e.key === 'd' || e.key === 'D') handlePress(2);
    if(e.key === 'j' || e.key === 'J') handlePress(3);
});
</script>
